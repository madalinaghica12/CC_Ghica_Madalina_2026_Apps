<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
</head>
<body>

<h1>Events List</h1>

<table border="1" id="eventsTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
fetch('/api/data')
    .then(response => response.json())
    .then(data => {
        const table = document.querySelector('#eventsTable tbody');

        data.forEach(event => {
            const row = document.createElement('tr');

            row.innerHTML = `
                <td>${event.id}</td>
                <td>${event.name}</td>
                <td>${event.date}</td>
            `;

            table.appendChild(row);
        });
    });
</script>

</body>
</html>
